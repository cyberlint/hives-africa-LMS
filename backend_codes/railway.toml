
[build]
builder = "nixpacks"

[deploy]
startCommand = "python manage.py migrate && gunicorn --bind 0.0.0.0:$PORT bmad_lms.wsgi:application"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10

[env]
DJANGO_SETTINGS_MODULE = "bmad_lms.settings.production"
DEBUG = "False"
PORT = "8000"

[[services]]
name = "backend"

[services.source]
repo = "your-repo-url"
branch = "main"

[services.variables]
SECRET_KEY = "${{SECRET_KEY}}"
DEBUG = "False"
ALLOWED_HOSTS = "${{RAILWAY_PUBLIC_DOMAIN}},${{RAILWAY_PRIVATE_DOMAIN}}"
DATABASE_URL = "${{DATABASE_URL}}"
CORS_ALLOWED_ORIGINS = "${{FRONTEND_URL}}"
DJANGO_SETTINGS_MODULE = "bmad_lms.settings.production"

[[services.database]]
engine = "postgresql"
